services:
  surge:
    # Use the released image by default. To build locally instead, run:
    #   docker compose up -d --build
    image: ghcr.io/cheminfo/surge:latest
    build: .
    init: true # allows to kill the process
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m
    cap_drop:
      - ALL
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "3"
    ulimits:
      core: 0 # We don't want core dump, we never analyse them anyway
      nofile: 256 # Max number of files that can be open
      nproc: 32 # Mas number of processes
    mem_limit: '256m' # max memory
    cpus: 2 # max 2 CPU cores
    networks:
      - traefik
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.surge.rule=Host(`surge.cheminfo.org`)'
      - 'traefik.http.routers.surge.entrypoints=websecure'
      - 'traefik.http.routers.surge.tls.certresolver=letsencrypt'

networks:
  traefik:
    external: true
